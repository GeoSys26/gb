<!doctype html>
<!-- グリーンボタン 中継ページ v2.1.0 (評価期間・使い捨て)
     v2.1.0 変更（index.html層のみ。iframe内=一点表示.gs は未変更）:
       ・登録ボタンを全幅バー→「文字幅＋少し」の中央ボタンに。
         全幅だと上の緑ヘッダ（全幅バー）と同じ形に見え、同種のバーと誤認され押せると気づかれない。
         航空写真ボタン（文字幅の角丸）と同じ語彙にして『押すもの』と直感させる。
       ・ボタンを一段大きく・影を強めて、地図（額縁の中）の外にある主アクションだと際立たせる。
       ・送信ボタンを発光緑#39ff14＋黒文字に統一（緑帯と同色）。『送信＝この色』の信号を一本化。
     v2.0.0: 地図を額縁化（周囲余白＋枠線＋角丸）。ボタン下部固定で常時可視。
     ?k=<統合番地> を受け、①地図GAS(exec)を ?k= 付きで iframe 表示 ②Formsプレフィルへ target=_top 遷移。
     名簿は持たない純URL変換器。 -->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>番地確認</title>
<style>
  :root{
    --pad: 14px;
    --frame: #cfcfcf;
    --bg:    #eef1f4;
    --go:    #39ff14;   /* 発光緑：緑帯(#39ff14)と統一し『送信＝この色』の信号を一本化 */
    --go2:   #22c400;   /* 押下時：一段沈めた発光緑 */
  }
  html,body{margin:0;padding:0;height:100%}
  body{display:flex;flex-direction:column;height:100vh;height:100dvh;
       font-family:sans-serif;overflow:hidden;background:var(--bg)}

  #frame{flex:1 1 auto;min-height:120px;
         margin:var(--pad) var(--pad) 8px var(--pad);
         border:1px solid var(--frame);border-radius:12px;
         background:#fff;overflow:hidden;position:relative;
         box-shadow:0 1px 4px rgba(0,0,0,.12)}
  #map{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}

  #hint{flex:0 0 auto;text-align:center;color:#555;font-size:13px;
        padding:0 var(--pad) 6px var(--pad);line-height:1.3}

  /* 登録ボタン＝中央・文字幅＋余白。全幅バーにしない（上の緑ヘッダと別種に見せる） */
  #bar{flex:0 0 auto;display:flex;justify-content:center;
       padding:0 var(--pad) calc(var(--pad) + env(safe-area-inset-bottom, 0px)) var(--pad)}
  #go{display:inline-flex;align-items:center;justify-content:center;gap:10px;
      max-width:100%;box-sizing:border-box;border:0;border-radius:14px;
      background:var(--go);color:#000;font:900 23px/1.2 sans-serif;
      padding:20px 34px;text-decoration:none;text-align:center;white-space:nowrap;
      box-shadow:0 4px 10px rgba(0,0,0,.35);cursor:pointer}
  #go:active{background:var(--go2);box-shadow:0 1px 3px rgba(0,0,0,.28)}
  #go .arw{font-size:19px}

  #err{padding:1.5em;font-size:18px;line-height:1.6}
</style>
</head>
<body>
<script>
/* ==== サイト固有の設定（差し替えはここだけ） ==== */
var GAS_EXEC   = 'https://script.google.com/macros/s/AKfycbyXaFkXkU2OZUFOthjelsiS6Qw-KYXRQa7gdgI_nUsxIFTyVyNsmevTgQ6BuWpDWmJ9/exec';
var FORM_BASE  = 'https://docs.google.com/forms/d/e/1FAIpQLScYjoeS19iGS42yKi5R5XZA1UE00eQCvWQtVIfodmOmbnFtGQ/viewform';
var FORM_ENTRY = '653868919';
var PAYLOAD_VER = '2026-06';
/* ============================================= */

var params = new URLSearchParams(location.search);
var k = (params.get('k') || '').trim();
var b = (params.get('b') || '').trim();

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

if (!k && !b){
  document.write('<div id="err"><b>番地が指定されていません。</b><br>QRコードから開いてください。</div>');
} else {
  var mapUrl  = GAS_EXEC + '?' + (k ? ('k=' + encodeURIComponent(k)) : ('b=' + encodeURIComponent(b)));
  var payload = 'GB,' + PAYLOAD_VER + ',' + (k || b);
  var formUrl = FORM_BASE + '?usp=pp_url&entry.' + FORM_ENTRY + '=' + encodeURIComponent(payload);

  document.write(
    '<div id="frame"><iframe id="map" src="' + esc(mapUrl) + '"></iframe></div>' +
    '<div id="hint">場所を確かめたら、下のボタンで登録に進みます</div>' +
    '<div id="bar"><a id="go" href="' + esc(formUrl) + '" target="_top">' +
    '<span>この場所で登録に進む</span><span class="arw">&#9654;</span></a></div>'
  );
}
</script>
</body>
</html>
